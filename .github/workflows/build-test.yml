name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build

      - name: Pack (validate)
        run: |
          dotnet pack src/Swazor/Swazor.csproj --configuration Debug --no-build --output ./nupkg
          dotnet pack src/Swazor.SwaggerUi/Swazor.SwaggerUi.csproj --configuration Debug --no-build --output ./nupkg