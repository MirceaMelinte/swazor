name: Publish to NuGet

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Resolve version from release tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Pack
        run: |
          dotnet pack src/Swazor/Swazor.csproj --configuration Release --no-build -p:Version=${{ steps.version.outputs.version }} --output ./nupkg
          dotnet pack src/Swazor.SwaggerUi/Swazor.SwaggerUi.csproj --configuration Release --no-build -p:Version=${{ steps.version.outputs.version }} --output ./nupkg

      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: MirceaMelinte

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate